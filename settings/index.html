<!doctype html>
<html>
  <head>
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
    <script type="text/javascript" src="/manager/webserver/assets/js/jquery.js"></script>
    <script type="text/javascript" src="js/settings.js"></script>
    <link rel="stylesheet" href="css/settings.css">
    <style>
      body {
        font-family: Arial, sans-serif;
      }
      fieldset {
        margin-bottom: 15px;
      }
      input[type="checkbox"] {
        margin-right: 10px;
      }
      label {
        margin-left: 5px;
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="settings.title"></h1>
    <fieldset>
      <p data-i18n="settings.compatinfo"></p>
      <input type="checkbox" id="compatmode">
      <label for="compatmode" data-i18n="settings.compatmode"></label>
    </fieldset>
    <fieldset>
      <p data-i18n="settings.debuginfo"></p>
      <input type="checkbox" id="debuglog">
      <label for="debuglog" data-i18n="settings.debuglog"></label>
    </fieldset>
    <section id="rf-manager">
      <div class="rf-header">
        <div>
          <h2 data-i18n="settings.command_manager_title"></h2>
          <p class="rf-subtitle" data-i18n="settings.command_manager_subtitle"></p>
        </div>
        <button id="rf-refresh-devices" class="ghost">Refresh devices</button>
      </div>
      <div class="rf-toolbar">
        <label for="rf-device-select">Device</label>
        <select id="rf-device-select"></select>
        <span id="rf-usage" class="rf-usage"></span>
      </div>
      <div id="rf-command-list" class="rf-command-list">
        <div class="rf-empty">Select a device to view learned commands.</div>
      </div>
      <div class="pronto-options">
        <label for="pronto-carrier" data-i18n="settings.pronto_carrier"></label>
        <input id="pronto-carrier" type="number" min="10000" max="100000" step="1000" value="38000">
        <span data-i18n="settings.pronto_carrier_hint"></span>
      </div>
      <div id="pronto-result" class="pronto-result" hidden>
        <div class="pronto-result-header">
          <div>
            <h3 data-i18n="settings.pronto_result_title"></h3>
            <div id="pronto-summary" class="pronto-summary"></div>
          </div>
          <button id="pronto-copy" type="button" class="primary" data-i18n="settings.pronto_copy"></button>
        </div>
        <textarea id="pronto-output" class="code" rows="7" readonly></textarea>
        <ul id="pronto-warnings" class="pronto-warnings"></ul>
        <p class="pronto-instructions" data-i18n="settings.pronto_instructions"></p>
      </div>
      <div class="rf-footer">
        <button id="rf-refresh-commands">Refresh commands</button>
        <span class="rf-hint">Generate Pronto Hex only for learned IR commands. RF commands are rejected.</span>
      </div>
    </section>
    <!--
    <fieldset>
      <p data-i18n="settings.errorreportinfo"></p>
      <input type="checkbox" id="errorreport">
      <label for="errorreport" data-i18n="settings.errorreport"></label>
    </fieldset>
    -->
  </body>
</html>
